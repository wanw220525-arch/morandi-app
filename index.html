<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#9CAF88" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="静谧生活" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>静谧生活 AI 规划器</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <!-- iOS 主屏图标（SVG inline data URI 方式） -->
    <link rel="apple-touch-icon" href="./assets/icons/icon-180.png" />
    <script>
      window.MORANDI_IS_NATIVE = !!(window.Capacitor || location.protocol === "capacitor:" || location.protocol === "ionic:");
      if (new URLSearchParams(location.search).get("figmaMobile") === "1") {
        document.documentElement.classList.add("figma-mobile-capture");
      }
    </script>
    <link rel="stylesheet" href="./src/frame.css" />
    <style>
      /* iOS 安全区适配 */
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #F4F2E5; overscroll-behavior: none; -webkit-text-size-adjust: 100%; }
      body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
      #app-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: none; }
    </style>
  </head>
  <body>
    <iframe id="app-frame" class="is-loading" title="静谧生活 AI 规划器"></iframe>
    <script src="./src/config/server-config.js"></script>
  <script src="./src/router.js"></script>
  </body>
</html>
