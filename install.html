<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="静谧生活"/>
<meta name="theme-color" content="#9CAF88"/>
<title>安装 静谧生活 App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;
  background:linear-gradient(160deg,#F4F2E5 0%,#E7E8D0 100%);
  min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  padding:24px 16px;
}
.card{
  background:rgba(255,255,250,0.88);
  border:1px solid rgba(255,255,247,0.72);
  border-radius:28px;
  box-shadow:10px 10px 28px rgba(101,89,76,0.13),-8px -8px 20px rgba(255,255,247,0.64);
  max-width:390px;width:100%;padding:36px 24px 32px;text-align:center;
}
.icon{font-size:64px;margin-bottom:12px;line-height:1}
h1{font-size:24px;font-weight:700;color:#3C7445;margin-bottom:4px}
.sub{font-size:13px;color:#71796F;margin-bottom:28px;line-height:1.6}
.btn-primary{
  display:block;width:100%;
  background:#9CAF88;color:#fff;
  font-size:16px;font-weight:600;
  padding:14px 20px;border-radius:16px;border:none;
  box-shadow:0 4px 14px rgba(60,116,69,0.25);
  cursor:pointer;text-decoration:none;margin-bottom:10px;
  transition:transform .15s,box-shadow .15s;
}
.btn-primary:active{transform:scale(0.97);box-shadow:0 2px 8px rgba(60,116,69,0.2)}
.divider{
  display:flex;align-items:center;gap:10px;
  color:#C0C9BD;font-size:12px;margin:18px 0;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#C0C9BD}
.step-list{text-align:left;margin-bottom:20px}
.step{
  display:flex;align-items:flex-start;gap:12px;
  padding:11px 14px;border-radius:14px;
  background:rgba(244,242,229,0.7);margin-bottom:8px;
}
.step-num{
  width:24px;height:24px;border-radius:50%;
  background:#9CAF88;color:#fff;
  font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.step-text{font-size:13px;color:#5B5147;line-height:1.55}
.step-text strong{color:#3C7445;font-weight:600}
.badge{
  display:inline-flex;align-items:center;gap:3px;
  background:#F3E0BF;border-radius:6px;
  padding:1px 6px;font-size:11px;color:#5B5147;font-weight:500;vertical-align:middle;
}
.hint{font-size:11px;color:#71796F;line-height:1.55;margin-top:14px;padding:10px 14px;background:rgba(232,214,211,0.3);border-radius:12px}
.server-url{
  font-family:'Menlo','SF Mono',monospace;font-size:12px;
  background:#EEF0D4;border-radius:10px;padding:8px 12px;
  color:#3C7445;word-break:break-all;margin:8px 0;
}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🌿</div>
  <h1>静谧生活</h1>
  <p class="sub">Morandi 风格 · AI 助手 · 日程 · 收支 · 清单</p>

  <!-- 方法一：下载描述文件 -->
  <a class="btn-primary" id="dl-btn" href="/morandi-lifeplanner.mobileconfig">
    📥 下载描述文件（推荐）
  </a>
  <p style="font-size:12px;color:#71796F;margin-bottom:4px">下载后去「设置 → 已下载描述文件」安装</p>

  <div class="divider">或者</div>

  <!-- 方法二：手动添加到主屏幕 -->
  <div class="step-list">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">点击 Safari 底栏 <span class="badge">⬆ 分享</span> 按钮</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">选择 <strong>「添加到主屏幕」</strong></div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">点右上角 <strong>「添加」</strong>，主屏幕出现 🌿 图标</div>
    </div>
  </div>

  <div class="hint">
    📡 服务器地址：<div class="server-url" id="srv-url">获取中…</div>
    手机须与电脑在同一 Wi-Fi，服务器需保持运行
  </div>
</div>
<script>
  const origin = window.location.origin;
  document.getElementById("srv-url").textContent = origin;
  document.getElementById("dl-btn").href = origin + "/morandi-lifeplanner.mobileconfig";
</script>
</body>
</html>
